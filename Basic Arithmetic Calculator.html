<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        center {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        h3 {
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 50px;
            height: 40px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #4facfe;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
            transform: scale(1.1);
        }

        #result {
            color: #222;
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
        }

        #Clear {
                background: red;
        }
    </style>

</head>

<body>
    <center>
        <h3>Basic Arithmetic Calculator</h3>
        <br>
        <label>Enter Value 1</label>
        <input id="box1" type="number">
        <br>
        <br>
        <label>Enter Value 2</label>
        <input id="box2" type="number">
        <br>
        <br>
        <button onclick="add()">+</button>
        <button onclick="subtract()">-</button>
        <button onclick="divide()">/</button>
        <button onclick="multiply()">*</button>
        <button id="Clear" onclick="clearBoxes()">C</button>
        <br>
        <br>
        <h4 id="result"></h4>
    </center>

    <script>

        function add() {

            let a = Number(document.getElementById('box1').value);
            let b = Number(document.getElementById('box2').value);

            document.getElementById('result').innerText = "Result: " + (a + b);

        }

        function subtract() {

            let a = Number(document.getElementById('box1').value);
            let b = Number(document.getElementById('box2').value);

            document.getElementById('result').innerText = "Result: " + (a - b);

        }

        function divide() {

            let a = Number(document.getElementById('box1').value);
            let b = Number(document.getElementById('box2').value);

            document.getElementById('result').innerText = "Result: " + (a / b);

        }

        function multiply() {

            let a = Number(document.getElementById('box1').value);
            let b = Number(document.getElementById('box2').value);

            document.getElementById('result').innerText = "Result: " + (a * b);

        }

        function clearBoxes() {

            document.getElementById('box1').value = "";
            document.getElementById('box2').value = "";
            document.getElementById('result').innerText = "";

        }

    </script>
</body>

</html>
