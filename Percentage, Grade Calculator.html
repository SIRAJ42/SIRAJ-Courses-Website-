<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>5 Subject Marksheet</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        .container {
            width: 350px;
            background: white;
            padding: 20px;
            margin: 80px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 6px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        h3 {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Percentage Calculator</h2>

        <input type="number" id="sub1" placeholder="English">
        <input type="number" id="sub2" placeholder="Mathematics">
        <input type="number" id="sub3" placeholder="Physics">
        <input type="number" id="sub4" placeholder="Chemistry">
        <input type="number" id="sub5" placeholder="Computer Science">

        <button onclick="calculate()">Calculate Result</button>

        <h3 id="total"></h3>
        <h3 id="percentage"></h3>
        <h3 id="grade"></h3>

    </div>

    <script>

        function calculate() {

            let s1 = Number(document.getElementById("sub1").value);
            let s2 = Number(document.getElementById("sub2").value);
            let s3 = Number(document.getElementById("sub3").value);
            let s4 = Number(document.getElementById("sub4").value);
            let s5 = Number(document.getElementById("sub5").value);

            let total = s1 + s2 + s3 + s4 + s5;

            let percentage = (total / 500) * 100;

            let grade;

            if (percentage >= 80) {
                grade = "A+";
            }
            else if (percentage >= 70) {
                grade = "A";
            }
            else if (percentage >= 60) {
                grade = "B";
            }
            else if (percentage >= 50) {
                grade = "C";
            }
            else {
                grade = "Fail";
            }

            document.getElementById("total").innerHTML = "Total Marks: " + total + " / 500";
            document.getElementById("percentage").innerHTML = "Percentage: " + percentage.toFixed(2) + "%";
            document.getElementById("grade").innerHTML = "Grade: " + grade;

        }

    </script>

</body>

</html>
