<!DOCTYPE html>
<html>
<head>
<title>Animated Registration Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* Form Container */
.form-box{
width:320px;
padding:30px;
background:#1e1b4b;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
animation:fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.form-box h2{
color:white;
text-align:center;
margin-bottom:20px;
}

/* Input fields */
.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:10px;
border:none;
outline:none;
border-radius:5px;
transition:0.3s;
}

/* Focus animation */
.input-box input:focus{
box-shadow:0 0 10px #6366f1;
transform:scale(1.03);
}

/* Button */
button{
width:100%;
padding:10px;
background:#6366f1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

/* Hover animation */
button:hover{
background:#a855f7;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="form-box">
<h2>Register</h2>

<div class="input-box">
<input type="text" placeholder="Full Name">
</div>

<div class="input-box">
<input type="email" placeholder="Email">
</div>

<div class="input-box">
<input type="password" placeholder="Password">
</div>

<div class="input-box">
<input type="password" placeholder="Confirm Password">
</div>

<button onclick="Register()">Signup</button>

</div>

<script>
    function Register () {
        alert("Signup Successfully!")
    }
</script> 

</body>
</html>
