<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, var(--dark) 50%);
            color: white;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.2);
            font-family: Arial;
            font-weight: bolder;
            color: white;
            letter-spacing: 1.5px;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            gap: 20px;
        }

        nav ul {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 20px;
            margin-right: 0;
            /* remove extra push */
        }

        nav ul li a {
            text-decoration: none;
            color: var(--light);
            font-weight: 500;
            transition: 0.3s;
            margin-right: 20px;
        }

        nav ul li a:hover {
            color: var(--secondary);
        }

        .nav-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--secondary);
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            color: white;
            border: 2px solid white;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: -250px;
        }

        .logo {
            width: 40px;
            height: 40px;
            margin-left: -220px;
            margin-right: 0;
        }

        .searchbar {
            display: flex;
            align-items: center;
        }

        .searchbar input {
            padding: 9px;
            border-radius: 12px;
            border: none;
            margin-left: 0;
            /* remove negative margin */
        }

        .menu-btn {
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            background: #6366f1;
            color: white;
            border: none;
            font-family: Arial;
        }

        .sidebar {
            position: fixed;
            left: -220px;
            top: 0;
            width: 200px;
            height: 100%;
            background: #1e1b4b;
            padding-top: 20px;
            transition: 0.3s;
            font-family: Arial;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            color: white;
            cursor: pointer;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
            transition: 0.3s;
            font-family: Arial;
            font-weight: bolder;
        }

        .sidebar a:hover {
            background: #a855f7;
        }

        .sidebar.active {
            left: 0;
        }

        section {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            width: 320px;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        section:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }

        .agef,
        .Guess,
        .ludogame {
            margin: 20px;
        }

        .projects-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 40px;
            width: 100%;
        }

        /* AGE FUTURE FINDER */

        .agef {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ddd;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px #667eea;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }


        /* GUESS NUMBER GAME ) */

        h1 {
            text-align: center;
            font-size: 27px;
            margin-top: -20px;
        }

        .Guess {
            text-align: center;
        }

        .Guess input {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        .Guess button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .Guess .result {
            margin-top: 10px;
            font-weight: bold;
        }

        /* LUDO GAME CSS (SAFE VERSION) */

        .ludogame {
            flex-basis: 20%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .ludo-board {
            width: 600px;
            height: 600px;
            background-color: white;
            display: grid;
            grid-template-columns: 240px 120px 240px;
            grid-template-rows: 240px 120px 240px;
            border: 2px solid black;
            transform: scale(0.75);
            /* fit inside page */
        }

        /* Colors */
        :root {
            --red: #ff0000;
            --green: #00a82d;
            --blue: #00a2ed;
            --yellow: #fff200;
            --border: 1px solid #000;
        }

        /* Base (home areas) */
        .base {
            display: flex;
            justify-content: center;
            align-items: center;
            border: var(--border);
        }

        .red {
            background-color: var(--red);
        }

        .green {
            background-color: var(--green);
        }

        .blue {
            background-color: var(--blue);
        }

        .yellow {
            background-color: var(--yellow);
        }

        /* Inner white box */
        .white-box {
            width: 160px;
            height: 160px;
            background-color: white;
            border: var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 15px;
            gap: 20px;
            border-radius: 35px;
        }

        /* Dots */
        .dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: var(--border);
            margin-left: 3px;
            margin-top: 3px;
        }

        .red-dot {
            background-color: var(--red);
        }

        .green-dot {
            background-color: var(--green);
        }

        .blue-dot {
            background-color: var(--blue);
        }

        .yellow-dot {
            background-color: var(--yellow);
        }

        /* Paths */
        .path {
            display: grid;
        }

        .vertical {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

        .horizontal {
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        /* Cells */
        .cell {
            border: 0.5px solid #555;
            box-sizing: border-box;
        }

        /* Center triangles */
        .home-triangle {
            position: relative;
            border: var(--border);
        }

        .tri {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }

        .top-tri {
            border-width: 60px 60px 0 60px;
            border-color: var(--green) transparent transparent transparent;
            top: 0;
        }

        .bottom-tri {
            border-width: 0 60px 60px 60px;
            border-color: transparent transparent var(--blue) transparent;
            bottom: 0;
        }

        .left-tri {
            border-width: 60px 0 60px 60px;
            border-color: transparent transparent transparent var(--red);
            left: 0;
        }

        .right-tri {
            border-width: 60px 60px 60px 0;
            border-color: transparent var(--yellow) transparent transparent;
            right: 0;
        }

        /* GUESS NUMBER GAME (SAFE CSS) */

        .Guess {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
            background: linear-gradient(135deg, #667eea, #764ba2)
        }

        /* Title */
        .Guess h1 {
            color: white;
            margin-top: -50px;
            font-size: 27px;
        }

        /* Input */
        .Guess input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ddd;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .Guess input:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px #667eea;
        }

        /* Button */
        .Guess button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .Guess button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .Guess button:active {
            transform: scale(0.95);
        }

        /* Result Text */
        .Guess .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
            min-height: 24px;
            transition: 0.3s;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button a {
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<script>
    // Menu Bar Section

    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
    }

    // Age Future Finder 

    function age() {

        let n = Number(document.getElementById('box1').value);

        let age;

        if (n >= 1 && n <= 15) {
            age = "Your Future will be a Learning to Walk / School Student / Computer Beginner / Drawinger / Science Explorer";
        }

        else if (n >= 16 && n <= 30) {
            age = "Your Future will be a College Student / Graduate / FreeLancer / Programmer / Business-man";
        }

        else if (n >= 31 && n <= 45) {
            age = "Your Future will be a Senior Professional / Doctor / IT Officer / Lawyer / Department Head";
        }

        else if (n >= 46 && n <= 60) {
            age = "Your Future will be a Company Director / Senior Advisor / MPA / MNA / Cheif Officer";
        }

        else if (n >= 61 && n <= 75) {
            age = "Your Future will be a Prime Minister / President / Judge or Cheif Justice / Minister / Retirement Planner";
        }

        else if (n >= 76 && n <= 100) {
            age = "Keep focus on your Health & Enjoy your Life";
        }

        else {
            age = "Enter Correct Age between 0 to 101";
        }

        document.getElementById('result').innerHTML = "Result: " + age;

    }


    // Guess Any Number

    function dahri() {
        let name = Number(document.querySelector('#siraj').value);
        let n = Math.floor(Math.random() * 10) + 1;

        let luck = "";
        let resultBox = document.querySelector(".karachi");

        if (name >= 1 && name <= 10) {
            if (n === name) {
                luck = "🎉 You won this game!";
                resultBox.style.color = "green";
            } else {
                luck = "❌ You lose! Number was " + n;
                resultBox.style.color = "red";
            }
        } else {
            luck = "⚠️ Enter a number between 1 and 10";
            resultBox.style.color = "yellow";
        }

        resultBox.innerText = luck;
    }

</script>
