<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, var(--dark) 50%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* NAVBAR */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logoA {
            width: 50px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
            margin: 0 auto;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: var(--secondary);
        }

        /* IMAGE SECTION */
        .image {
            text-align: center;
            margin-top: 80px;
        }

        .photo {
            width: 350px;
            height: 300px;
            border: 10px solid #f6f6f6;
            box-shadow: 0 0 25px #00f7ff;
            background-color: aliceblue;
            margin: auto;
            overflow: hidden;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image input {
            margin-top: 20px;
            border: 2px solid yellow;
            padding: 15px;
            border-radius: 15px;
            animation: file 8s infinite;
        }

        @keyframes file {
            0% {
                border-color: yellow;
            }

            20% {
                border-color: rgb(0, 153, 255);
            }

            40% {
                border-color: rgb(38, 0, 255);
            }

            60% {
                border-color: rgb(0, 255, 30);
            }

            80% {
                border-color: rgb(255, 94, 0);
            }

            100% {
                border-color: rgb(0, 42, 255);
            }
        }

        @media (max-width:768px) {
            .photo {
                width: 90%;
                height: 250px;
            }

            nav ul {
                gap: 15px;
                font-size: 14px;
            }
        }

        /* Center Buttons Layout */
        .centerbuttons ul {
            list-style: none;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            margin-left: 50px;
            position: absolute;
        }

        /* RGB Style ONLY for centerbuttons links */
        .centerbuttons a {
            position: relative;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            background: #111;
            overflow: hidden;
            z-index: 1;
            transition: 0.3s ease;
            display: inline-block;
            font-size: 14px;
            margin-top: 30px;
        }

        /* RGB Border Animation */
        .centerbuttons a::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(45deg,
                    red,
                    orange,
                    yellow,
                    green,
                    cyan,
                    blue,
                    violet,
                    red);
            background-size: 400%;
            z-index: -1;
            animation: rgbMove 6s linear infinite;
        }

        /* Inner background */
        .centerbuttons a::after {
            content: "";
            position: absolute;
            inset: 2px;
            background: #111;
            border-radius: 30px;
            z-index: -1;
        }

        /* Hover */
        .centerbuttons a:hover {
            transform: scale(1.1);
            letter-spacing: 1px;
        }

        /* Click */
        .centerbuttons a:active {
            transform: scale(0.95);
        }

        /* Animation */
        @keyframes rgbMove {
            0% {
                background-position: 0%;
            }

            100% {
                background-position: 400%;
            }
        }
    </style>
</head>

<body>

    <header>
        <nav>

            <div class="logo-box">
                <img class="logoA" src="logo.png">
                <div class="logo">Genius Platform</div>
            </div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Aboutus.html"></a></li>
                <li><a href="Services.html">Services</a></li>
                <li><a href="Settings.html">Settings</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="Registrationform.html">Signup</a></li>

            </ul>

        </nav>
    </header>

    <div class="centerbuttons">
        <ul>
            <li><a href="Registrationform.html">Register</a></li>
            <li><a href="privacy.html">Privacy</a></li>
            <li><a href="Settings.html">Settings</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </div>

    <div class="image">
        <div class="photo">
            <img id="preview">
        </div>

        <br><br>

        <input type="file" id="fileInput">
    </div>

    <script>
        const img = document.getElementById('preview');
        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener("change", function () {
            if (this.files && this.files[0]) {
                img.src = URL.createObjectURL(this.files[0]);
            }
        });

        function logout() {
            alert("Logout Successfully!");
        }
    </script>

</body>

</html>
