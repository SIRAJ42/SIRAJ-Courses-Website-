<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: #ffffff;
            --card-hover-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, var(--dark) 50%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            margin-left: 500px;
        }

        nav ul {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--light);
            font-weight: 500;
            transition: 0.3s;
            font-family: Arial;
            font-weight: bolder;
        }

        nav ul li a:hover {
            color: var(--secondary);
        }

        .nav-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid var(--secondary);
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
            color: white;
            border: 2px solid white;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 20px;
        }

        .image input {
            margin-top: 100px;
            border: 2px solid yellow;
            padding: 20px;
            border-radius: 15px;
            transition: 3s;
            animation: file 10s infinite;
        }

        @keyframes file {

            0% {
                border: 5px solid yellow;
            }

            20% {
                border: 5px solid rgb(0, 153, 255);
            }

            40% {
                border: 5px solid rgb(38, 0, 255);
            }

            60% {
                border: 5px solid rgb(0, 255, 30);
            }

            80% {
                border: 5px solid rgb(255, 94, 0);
            }

            100% {
                border: 5px solid rgb(0, 42, 255);
            }

        }

        @media (max-width: 768px) {
            nav ul {
                display: none;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <center>
        <header>
            <nav>
                <ul>
                    <li><a href="Registrationform.html">Register</a></li>
                    <li><a href="">Privacy</a></li>
                    <li><a href="">Settings</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="">Logout</a></li>
                </ul>
            </nav>
        </header>
        <div class="image">
            <input type="file">
        </div>
    </center>
</body>

</html>
