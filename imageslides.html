<!DOCTYPE html>
<html>

<head>
    <title>Animated Image Slider</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .slider {
            width: 400px;
            height: 250px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            margin-left: 600px;
        }

        .slides {
            display: flex;
            width: 400%;
            animation: slide 12s infinite;
        }

        .slides img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        @keyframes slide {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-25%);
            }

            50% {
                transform: translateX(-50%);
            }

            75% {
                transform: translateX(-75%);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>

</head>

<body>

    <div class="slider">
        <div class="slides">
            <img src="https://picsum.photos/400/250?1">
            <img src="https://picsum.photos/400/250?2">
            <img src="https://picsum.photos/400/250?3">
            <img src="https://picsum.photos/400/250?4">
        </div>
    </div>

</body>

</html>
