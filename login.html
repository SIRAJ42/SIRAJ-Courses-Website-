<!DOCTYPE html>
<html>
<head>
<title>Animated Login Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* Form container */
.login-box{
width:320px;
padding:30px;
background:#1e1b4b;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
animation:slideIn 0.8s ease;
}

/* Animation */
@keyframes slideIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.login-box h2{
color:white;
text-align:center;
margin-bottom:20px;
}

/* Input box */
.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:10px;
border:none;
outline:none;
border-radius:5px;
transition:0.3s;
}

/* Floating label */
.input-box label{
position:absolute;
top:50%;
left:10px;
color:#555;
transform:translateY(-50%);
pointer-events:none;
transition:0.3s;
}

/* Animation on focus */
.input-box input:focus{
box-shadow:0 0 10px #6366f1;
transform:scale(1.03);
}

.input-box input:focus + label,
.input-box input:valid + label{
top:-8px;
font-size:12px;
color:#a855f7;
background:#1e1b4b;
padding:0 5px;
}

/* Button */
button{
width:100%;
padding:10px;
background:#6366f1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

/* Button hover */
button:hover{
background:#a855f7;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<div class="input-box">
<input type="text" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<button onclick="login()">Login</button>

</div>

<script>
    function login () {
        alert("Login Successfully!")
    }
</script>

</body>
</html>
