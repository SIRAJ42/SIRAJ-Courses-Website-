<!DOCTYPE html>
<html>

<head>
    <title>Responsive Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
        }

        .menu-btn {
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            background: #6366f1;
            color: white;
            border: none;
        }

        .sidebar {
            position: fixed;
            left: -220px;
            top: 0;
            width: 200px;
            height: 100%;
            background: #1e1b4b;
            padding-top: 20px;
            transition: 0.3s;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            color: white;
            cursor: pointer;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #a855f7;
        }

        .sidebar.active {
            left: 0;
        }
    </style>
</head>

<body>
    <div class="menubar">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleMenu()">✖</span>

        <a href="#">Home</a>
        <a href="#">About us</a>
        <a href="#">Services</a>
        <a href="#">Products</a>
        <a href="#">Login</a>
        <a href="#">Signup</a>
    </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }
    </script>

</body>

</html>
